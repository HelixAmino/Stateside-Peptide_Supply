<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peptide Order Optimizer — Minimize Cost Across Suppliers</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: Inter, system-ui, sans-serif; }
  .supplier-viv { border-left: 4px solid #3b82f6; }
  .supplier-pl { border-left: 4px solid #10b981; }
  .supplier-df { border-left: 4px solid #f59e0b; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-6">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">Peptide Order Optimizer</h1>
        <p class="text-sm text-slate-500 mt-1">Prices in <strong>RMB</strong> + USD · 10-vial boxes · Auto-splits to cheapest supplier</p>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-2 bg-white border border-slate-300 rounded-lg px-3 py-1.5 text-sm">
          <span class="text-slate-500">1 USD =</span>
          <input id="rate" type="number" step="0.01" min="1" max="20" value="7.20"
                 class="w-16 text-center font-medium focus:outline-none"
                 onchange="renderAll()" oninput="renderAll()">
          <span class="text-slate-500">RMB</span>
        </div>
        <button onclick="clearOrder()" class="px-4 py-2 text-sm border border-slate-300 rounded-lg hover:bg-slate-100">Clear Order</button>
        <button onclick="exportOrders()" class="px-4 py-2 text-sm bg-slate-900 text-white rounded-lg hover:bg-slate-800">Export Orders</button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Left: Catalog -->
      <div class="lg:col-span-2 space-y-4">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
          <div class="flex gap-3 mb-4">
            <input id="search" type="text" placeholder="Search product (e.g. retatrutide, ss-31, glow)..." 
                   class="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   oninput="renderCatalog()">
            <select id="filterSource" onchange="renderCatalog()" class="px-3 py-2 border border-slate-300 rounded-lg text-sm">
              <option value="all">All sources</option>
              <option value="Viv">Has Viv</option>
              <option value="价格表">Has 价格表</option>
              <option value="Direct Factory">Has Direct Factory</option>
            </select>
          </div>
          <div id="catalog" class="max-h-[62vh] overflow-y-auto space-y-1"></div>
        </div>
      </div>

      <!-- Right: Order Summary -->
      <div class="space-y-4">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
          <h2 class="font-semibold text-lg mb-3">Your Order</h2>
          <div id="orderLines" class="space-y-2 max-h-56 overflow-y-auto text-sm"></div>
          <div class="border-t mt-3 pt-3 space-y-1 text-sm">
            <div class="flex justify-between"><span>Total boxes</span><span id="totalBoxes" class="font-medium">0</span></div>
            <div class="flex justify-between text-base font-bold">
              <span>Total Cost</span>
              <span id="totalCost">¥0 / $0</span>
            </div>
            <div class="flex justify-between text-green-700 text-xs">
              <span>vs most expensive option</span>
              <span id="savings">—</span>
            </div>
          </div>
        </div>

        <!-- Supplier breakdown -->
        <div id="supplierOrders" class="space-y-3"></div>
      </div>
    </div>
  </div>

let order = {}; // id -> qty

function getRate() {
  const r = parseFloat(document.getElementById('rate').value);
  return (r && r > 0) ? r : 7.20;
}

function rmb(n) {
  return '¥' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}
function usd(n) {
  const u = n / getRate();
  return '$' + u.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function both(n) {
  return rmb(n) + ' <span class="text-slate-400">/</span> ' + usd(n);
}

function renderCatalog() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const srcFilter = document.getElementById('filterSource').value;
  const el = document.getElementById('catalog');
  
  let items = CATALOG.filter(item => {
    if (q && !item.product.toLowerCase().includes(q) && !item.strength.includes(q) && !item.spec.toLowerCase().includes(q)) return false;
    if (srcFilter !== 'all' && (item.prices[srcFilter] == null)) return false;
    return true;
  });

  el.innerHTML = items.map(item => {
    const prices = item.prices;
    const best = item.best_source;
    const qty = order[item.id] || 0;
    
    const priceCells = ['Viv', '价格表', 'Direct Factory'].map(s => {
      const p = prices[s];
      if (p == null) return `<span class="text-slate-300 text-xs">—</span>`;
      const isBest = s === best;
      return `<span class="text-xs ${isBest ? 'font-bold text-green-700' : 'text-slate-600'}">${rmb(p)} <span class="text-slate-400">${usd(p)}</span>${isBest ? ' ★' : ''}</span>`;
    }).join('');

    return `
      <div class="flex items-center gap-3 py-2 px-2 hover:bg-slate-50 rounded-lg border-b border-slate-100">
        <div class="flex-1 min-w-0">
          <div class="font-medium text-sm truncate">${item.product}</div>
          <div class="text-xs text-slate-500">${item.strength} · ${item.spec}</div>
          <div class="flex flex-wrap gap-x-4 gap-y-0.5 mt-1">${priceCells}</div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <input type="number" min="0" max="999" value="${qty}" 
                 class="w-16 px-2 py-1 border border-slate-300 rounded text-sm text-center"
                 onchange="setQty('${item.id}', this.value)"
                 onclick="this.select()">
          <button onclick="addOne('${item.id}')" class="px-2 py-1 bg-blue-600 text-white text-xs rounded hover:bg-blue-700">+</button>
        </div>
      </div>`;
  }).join('') || '<div class="text-slate-400 text-sm py-8 text-center">No matching products</div>';
}

function setQty(id, val) {
  const n = parseInt(val) || 0;
  if (n <= 0) delete order[id];
  else order[id] = n;
  renderAll();
}

function addOne(id) {
  order[id] = (order[id] || 0) + 1;
  renderAll();
}

function clearOrder() {
  if (Object.keys(order).length && !confirm('Clear the entire order?')) return;
  order = {};
  renderAll();
}

function renderOrder() {
  const el = document.getElementById('orderLines');
  const ids = Object.keys(order);
  if (!ids.length) {
    el.innerHTML = '<div class="text-slate-400 text-sm py-4 text-center">Add products from the left</div>';
    document.getElementById('totalBoxes').textContent = '0';
    document.getElementById('totalCost').innerHTML = '¥0 / $0';
    document.getElementById('savings').textContent = '—';
    document.getElementById('supplierOrders').innerHTML = '';
    return;
  }

  let totalBoxes = 0;
  let totalCost = 0;
  let maxCost = 0;

  const bySupplier = { 'Viv': [], '价格表': [], 'Direct Factory': [] };

  ids.forEach(id => {
    const item = CATALOG.find(c => c.id === id);
    if (!item) return;
    const qty = order[id];
    totalBoxes += qty;
    const cost = item.best_price * qty;
    totalCost += cost;

    const available = Object.values(item.prices).filter(p => p != null);
    const maxP = Math.max(...available);
    maxCost += maxP * qty;

    bySupplier[item.best_source].push({ item, qty, lineCost: cost });
  });

  el.innerHTML = ids.map(id => {
    const item = CATALOG.find(c => c.id === id);
    const qty = order[id];
    return `
      <div class="flex justify-between items-start gap-2">
        <div class="min-w-0">
          <div class="font-medium truncate">${item.product} ${item.strength}</div>
          <div class="text-xs text-slate-500">→ ${item.best_source} @ ${rmb(item.best_price)} / ${usd(item.best_price)}</div>
        </div>
        <div class="text-right whitespace-nowrap">
          <div>×${qty}</div>
          <div class="text-xs text-slate-500">${rmb(item.best_price * qty)}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('totalBoxes').textContent = totalBoxes;
  document.getElementById('totalCost').innerHTML = both(totalCost);
  document.getElementById('savings').innerHTML = both(maxCost - totalCost) + ' saved';

  const supplierOrders = document.getElementById('supplierOrders');
  const colors = {
    'Viv': 'supplier-viv bg-blue-50',
    '价格表': 'supplier-pl bg-emerald-50',
    'Direct Factory': 'supplier-df bg-amber-50'
  };
  const labels = {
    'Viv': 'Viv (+852 6463 9937)',
    '价格表': '价格表',
    'Direct Factory': 'Direct Factory'
  };

  supplierOrders.innerHTML = ['Viv', '价格表', 'Direct Factory'].map(src => {
    const lines = bySupplier[src];
    if (!lines.length) return '';
    const subtotal = lines.reduce((s, l) => s + l.lineCost, 0);
    const boxes = lines.reduce((s, l) => s + l.qty, 0);
    return `
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 ${colors[src]}">
        <div class="flex justify-between items-center mb-2">
          <h3 class="font-semibold text-sm">${labels[src]}</h3>
          <span class="text-xs bg-white/80 px-2 py-0.5 rounded">${boxes} boxes · ${rmb(subtotal)} / ${usd(subtotal)}</span>
        </div>
        <div class="space-y-1 text-xs">
          ${lines.map(l => `
            <div class="flex justify-between gap-2">
              <span class="truncate">${l.item.product} ${l.item.strength} <span class="text-slate-400">(${l.item.codes[src] || '—'})</span></span>
              <span class="whitespace-nowrap">×${l.qty} = ${rmb(l.lineCost)}</span>
            </div>`).join('')}
        </div>
        <button onclick="copySupplierOrder('${src}')" class="mt-3 w-full py-1.5 text-xs border border-slate-300 rounded hover:bg-white/50">
          Copy this supplier order
        </button>
      </div>`;
  }).join('');
}

function copySupplierOrder(src) {
  const rate = getRate();
  const lines = [];
  Object.keys(order).forEach(id => {
    const item = CATALOG.find(c => c.id === id);
    if (item && item.best_source === src) {
      const code = item.codes[src] || '';
      const qty = order[id];
      const rmbPrice = item.best_price;
      const usdPrice = (rmbPrice / rate).toFixed(2);
      const lineRmb = rmbPrice * qty;
      const lineUsd = (lineRmb / rate).toFixed(2);
      lines.push(`${code}	${item.product}	${item.strength}	${item.spec}	${qty}	${rmbPrice}	${usdPrice}	${lineRmb}	${lineUsd}`);
    }
  });
  const header = 'Code	Product	Strength	Spec	Qty (boxes)	Unit RMB	Unit USD	Line RMB	Line USD';
  const text = header + '
' + lines.join('
');
  navigator.clipboard.writeText(text).then(() => alert('Copied ' + src + ' order to clipboard (RMB + USD)'));
}

function exportOrders() {
  const rate = getRate();
  let text = 'PEPTIDE ORDER — OPTIMIZED BY CHEAPEST SUPPLIER
';
  text += 'Generated: ' + new Date().toLocaleString() + '
';
  text += 'Exchange rate used: 1 USD = ' + rate + ' RMB
';
  text += 'All original prices in RMB (10-vial boxes)

';

  ['Viv', '价格表', 'Direct Factory'].forEach(src => {
    const lines = [];
    let sub = 0;
    Object.keys(order).forEach(id => {
      const item = CATALOG.find(c => c.id === id);
      if (item && item.best_source === src) {
        const qty = order[id];
        const line = item.best_price * qty;
        sub += line;
        const usdLine = (line / rate).toFixed(2);
        lines.push(`  ${item.codes[src] || '—'}	${item.product} ${item.strength}	×${qty}	@ ¥${item.best_price} ($${(item.best_price/rate).toFixed(2)})	= ¥${line} ($${usdLine})`);
      }
    });
    if (lines.length) {
      text += `=== ${src.toUpperCase()} ===
`;
      text += lines.join('
') + '
';
      text += `  SUBTOTAL: ¥${sub}  |  $${(sub/rate).toFixed(2)}

`;
    }
  });

  let total = 0;
  Object.keys(order).forEach(id => {
    const item = CATALOG.find(c => c.id === id);
    if (item) total += item.best_price * order[id];
  });
  text += `GRAND TOTAL: ¥${total}  |  $${(total/rate).toFixed(2)}
`;

  const blob = new Blob([text], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'peptide_optimized_orders.txt';
  a.click();
}

function renderAll() {
  renderCatalog();
  renderOrder();
}

renderAll();
</script>
</body>
</html>
